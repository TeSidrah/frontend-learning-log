<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
        <link rel="stylesheet" href="CSS/style.css">
        <title>Frontend Mentor | Blog preview card</title>
    </head>
    <body>
        <main class="card">
            <img src="images/illustration-article.svg" alt="" class="card__image">
            <span class="card__tag">Learning</span>
            <p class="card__date">Published 21 Dec 2023</p>
            <h1 class="card__title"><a href="#">HTML & CSS foundations</a></h1>
            <p class="card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            <div class="card__author">
                <img src="images/image-avatar.webp" alt="Greg Hooper" class="card__avatar">
                <span class="card__author-name">Greg Hooper</span>
            </div>
        </main>
    </body>
</html>
