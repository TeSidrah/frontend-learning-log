<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main class="card">
      <div class="image-container">
        <img
          src="images/image-equilibrium.jpg"
          alt="Abstract render of an iridescent glass cube"
          class="main-image"
        />
        <img src="images/icon-view.svg" alt="" class="hover-image" />
      </div>
      <h1><a href="#">Equilibrium #3429</a></h1>
      <p>Our Equilibrium collection promotes balance and calm.</p>
      <div class="data">
        <div class="pair">
          <img src="images/icon-ethereum.svg" alt="" />
          <span class="ETH">0.041 ETH</span>
        </div>
        <div class="pair">
          <img src="images/icon-clock.svg" alt="" />
          <span> 3 days left</span>
        </div>
      </div>
      <hr />
      <figure>
        <img
          src="images/image-avatar.png"
          alt="Jules Wyvern"
          class="avatar"
        />
        <figcaption>Creation of <a href="#">Jules Wyvern</a></figcaption>
      </figure>
    </main>
  </body>
</html>
