<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main class="card">
      <img src="images/illustration-hero.svg" alt="" class="hero" />
      <div class="summary">
        <h1>Order Summary</h1>
        <p>
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
        <div class="box">
          <div class="annual-plan">
            <img src="images/icon-music.svg" alt="" />
            <div class="price">
              <span class="price-head">Annual Plan</span>
              <span class="price-tag">$59.99/year</span>
            </div>
          </div>
          <button type="button" class="box-button">Change</button>
        </div>
        <a href="#">Proceed to Payment</a>
        <button type="button" class="order-button">Cancel Order</button>
      </div>
    </main>
  </body>
</html>
